name: Lua syntax check

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"
      - name: Check syntax of every .lua file
        run: |
          status=0
          for f in $(find . -name '*.lua' -not -path './tools/*'); do
            if ! luac5.1 -p "$f"; then
              echo "::error file=$f::syntax error"
              status=1
            fi
          done
          exit $status
